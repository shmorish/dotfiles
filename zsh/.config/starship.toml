# Starship configuration
# https://starship.rs/config/

# プロンプト全体のフォーマット
format = """
$os\
$username\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$aws\
$cmd_duration\
$time\
$line_break\
$character"""

# カラーパレット
palette = "custom"

[palettes.custom]
blue = "#61AFEF"
green = "#98C379"
yellow = "#E5C07B"
red = "#E06C75"
purple = "#C678DD"
cyan = "#56B6C2"
orange = "#D19A66"
gray = "#5C6370"
white = "#ABB2BF"
bg = "#282C34"

# ディレクトリ
[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
read_only_style = "red"

[directory.substitutions]
"~/Documents" = "󰈙 "
"~/Downloads" = " "
"~/Desktop" = " "
"~" = "󱂵 "

# Git ブランチ
[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch(:$remote_branch)]($style) "
truncation_length = 30

# Git ステータス
[git_status]
style = "red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = " "
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

# Git メトリクス
[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
disabled = false

# Git 状態
[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"

# AWS プロファイル（右端）
[aws]
symbol = " "
style = "bold orange"
format = '[$symbol($profile)(\($region\))]($style) '
disabled = false
expiration_symbol = "󰦙"
# 表示するプロファイルのフィルタ（全て表示する場合は以下をコメントアウト）
# force_display = true

# コマンド実行時間
[cmd_duration]
min_time = 2_000
style = "bold yellow"
format = "[ $duration]($style) "

# 時刻
[time]
disabled = false
style = "bold gray"
format = "[$time]($style)"
time_format = "%H:%M"
utc_time_offset = "+9"

# 改行後のプロンプト文字
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# OS アイコン
[os]
disabled = false
style = "bold white"
format = "[$symbol ]($style)"

[os.symbols]
Macos = ""
Linux = ""
Windows = "󰍲"

# ユーザー（SSH接続時のみ表示）
[username]
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)[@](bold gray)"
disabled = false
show_always = false

# フィラー（右側モジュールを右寄せ）
[fill]
symbol = " "

# Node.js
[nodejs]
symbol = " "
style = "bold green"
format = "[$symbol$version]($style) "
detect_files = ["package.json", ".nvmrc", ".node-version"]

# Python
[python]
symbol = " "
style = "bold yellow"
format = '[$symbol$version(\($virtualenv\))]($style) '
detect_files = ["requirements.txt", "pyproject.toml", ".python-version", "Pipfile"]

# Rust
[rust]
symbol = " "
style = "bold orange"
format = "[$symbol$version]($style) "

# Go
[golang]
symbol = "󰟓 "
style = "bold cyan"
format = "[$symbol$version]($style) "

# Java
[java]
symbol = " "
style = "bold red"
format = "[$symbol$version]($style) "

# Docker context（デフォルト以外のみ表示）
[docker_context]
symbol = " "
style = "bold blue"
format = "[$symbol$context]($style) "
only_with_files = false
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

# Terraform workspace
[terraform]
symbol = "󱁢 "
style = "bold purple"
format = "[$symbol$workspace]($style) "

# 環境変数（AWS_PROFILE を直接表示したい場合の補助）
[env_var.AWS_PROFILE]
variable = "AWS_PROFILE"
symbol = " "
style = "bold orange"
format = '[$symbol$env_value]($style) '
disabled = true  # aws モジュールと重複するため無効化（必要なら true に）

# package バージョン（manifest がある場合）
[package]
symbol = "󰏗 "
style = "bold yellow"
format = "[$symbol$version]($style) "
disabled = true
