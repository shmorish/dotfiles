name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - name: Clone repository
      run: git clone https://github.com/shmorish/dotfiles.git $HOME/dotfiles
    
    - name: Move to dotfiles directory
      run: cd $HOME/dotfiles

    - name: Run setup
      run: |
        # GitHub Actions では HOME が /Users/runner になるため、
        # シンボリックリンク作成先を調整する必要がある場合があります
        make setup
      shell: zsh {0}

    - name: Run ls to verify dotfiles
      run: ls -laR $HOME
      shell: zsh {0}
    
    - name: Run cleanup
      run: |
        make clean
      shell: zsh {0}
